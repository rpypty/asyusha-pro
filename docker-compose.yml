services:
  postgres:
    image: postgres:16-alpine
    container_name: asysha-pro-postgres
    environment:
      POSTGRES_DB: asysha_pro
      POSTGRES_USER: asysha
      POSTGRES_PASSWORD: asysha
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asysha -d asysha_pro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
