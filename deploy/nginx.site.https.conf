server {
    listen 80;
    listen [::]:80;
    server_name asyusha.space www.asyusha.space;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://asyusha.space$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.asyusha.space;

    ssl_certificate /etc/letsencrypt/live/asyusha.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asyusha.space/privkey.pem;

    return 301 https://asyusha.space$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name asyusha.space;

    ssl_certificate /etc/letsencrypt/live/asyusha.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asyusha.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:ASYUSHA_SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 2m;

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location / {
        proxy_pass http://127.0.0.1:5080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
